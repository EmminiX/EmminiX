# ──────────────────────────────────────────────────────────────────────────
#  Contributions refresh — rolling 12-month counter + 6-month activity chart
#
#  1. Rolling-12-month total (public + private) -> contributions.json (a
#     shields.io endpoint the README badge reads).
#  2. Last-182-day daily contributions -> activity.svg, a self-rendered area
#     chart (scripts/render_activity.py). Self-hosted so it isn't capped by a
#     third-party service and degrades gracefully: if a refresh fails, the
#     previous activity.svg is kept (never replaced with a broken render).
#
#  Runs every 6 hours + on demand. Uses GITHUB_TOKEN (or METRICS_TOKEN) which
#  already has read access to the authenticated user's contributions.
# ──────────────────────────────────────────────────────────────────────────

name: Contributions

on:
  schedule:
    - cron: "0 */6 * * *"     # every 6h (4x/day) - data only changes daily
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Query GraphQL + write badge JSON
        env:
          GH_TOKEN: ${{ secrets.METRICS_TOKEN || github.token }}
        run: |
          set -euo pipefail
          RESP=$(gh api graphql -f query='{
            user(login: "EmminiX") {
              contributionsCollection {
                contributionCalendar { totalContributions }
              }
            }
          }')
          TOTAL=$(echo "$RESP" | jq -r '.data.user.contributionsCollection.contributionCalendar.totalContributions')

          if [ -z "$TOTAL" ] || [ "$TOTAL" = "null" ]; then
            echo "::error::GraphQL returned no total; aborting"
            exit 1
          fi

          # Format with thousands separator
          FORMATTED=$(printf "%'d" "$TOTAL")

          cat > contributions.json <<EOF
          {
            "schemaVersion": 1,
            "label": "contributions · last 12 months",
            "message": "${FORMATTED}",
            "color": "22C55E",
            "labelColor": "0F172A",
            "cacheSeconds": 21600
          }
          EOF

          echo "Wrote contributions.json (total=$FORMATTED)"

      - name: Render 6-month activity chart
        env:
          GH_TOKEN: ${{ secrets.METRICS_TOKEN || github.token }}
        run: |
          # No `set -e`: a transient fetch/render failure must NOT fail the run
          # (no noisy failure email) and must keep the previous good activity.svg.
          set -uo pipefail
          FROM=$(date -u -d '-182 days' +%Y-%m-%dT%H:%M:%SZ)
          TO=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          if gh api graphql -f query='
                query($from:DateTime!,$to:DateTime!){
                  user(login:"EmminiX"){
                    contributionsCollection(from:$from, to:$to){
                      contributionCalendar{
                        weeks{ contributionDays{ date contributionCount } }
                      }
                    }
                  }
                }' -F from="$FROM" -F to="$TO" \
               | jq '[.data.user.contributionsCollection.contributionCalendar.weeks[].contributionDays[] | {date, count: .contributionCount}]' > daily.json \
             && jq -e 'length >= 150' daily.json >/dev/null \
             && python3 scripts/render_activity.py < daily.json > activity.svg.tmp \
             && python3 -c 'import xml.dom.minidom,os,sys; xml.dom.minidom.parse("activity.svg.tmp"); sys.exit(0 if os.path.getsize("activity.svg.tmp")>2000 else 1)'; then
            mv activity.svg.tmp activity.svg
            echo "activity.svg updated"
          else
            echo "::warning::activity chart refresh failed; keeping previous activity.svg"
            rm -f activity.svg.tmp
          fi
          rm -f daily.json

      - name: Render GitHub stats card
        env:
          GH_TOKEN: ${{ secrets.METRICS_TOKEN || github.token }}
        run: |
          set -uo pipefail
          if gh api graphql -f query='
                query($login:String!){
                  user(login:$login){
                    name
                    followers{ totalCount }
                    pullRequests{ totalCount }
                    issues{ totalCount }
                    contributionsCollection{
                      totalCommitContributions
                      restrictedContributionsCount
                      totalPullRequestReviewContributions
                      totalRepositoriesWithContributedCommits
                    }
                    repositories(first:100, ownerAffiliations:OWNER, orderBy:{field:STARGAZERS,direction:DESC}){
                      totalCount nodes{ stargazerCount }
                    }
                  }
                }' -F login=EmminiX > stats.json \
             && jq -e '.data.user.repositories.totalCount <= 100' stats.json >/dev/null \
             && python3 scripts/render_cards.py --kind stats < stats.json > stats.svg.tmp \
             && python3 -c 'import xml.dom.minidom,os,sys; xml.dom.minidom.parse("stats.svg.tmp"); sys.exit(0 if os.path.getsize("stats.svg.tmp")>1000 else 1)'; then
            mv stats.svg.tmp stats.svg
            echo "stats.svg updated"
          else
            echo "::warning::stats card refresh failed; keeping previous stats.svg"
            rm -f stats.svg.tmp
          fi
          rm -f stats.json

      - name: Render top-languages card
        env:
          GH_TOKEN: ${{ secrets.METRICS_TOKEN || github.token }}
        run: |
          set -uo pipefail
          if gh api graphql -f query='
                query($login:String!){
                  user(login:$login){
                    repositories(first:100, ownerAffiliations:OWNER, isFork:false){
                      totalCount
                      nodes{ languages(first:100, orderBy:{field:SIZE,direction:DESC}){ edges{ size node{ name color } } } }
                    }
                  }
                }' -F login=EmminiX > langs.json \
             && jq -e '.data.user.repositories.totalCount <= 100' langs.json >/dev/null \
             && python3 scripts/render_cards.py --kind langs < langs.json > top-langs.svg.tmp \
             && python3 -c 'import xml.dom.minidom,os,sys; xml.dom.minidom.parse("top-langs.svg.tmp"); sys.exit(0 if os.path.getsize("top-langs.svg.tmp")>1000 else 1)'; then
            mv top-langs.svg.tmp top-langs.svg
            echo "top-langs.svg updated"
          else
            echo "::warning::top-languages card refresh failed; keeping previous top-langs.svg"
            rm -f top-langs.svg.tmp
          fi
          rm -f langs.json

      - name: Commit + push if changed
        run: |
          git add contributions.json activity.svg stats.svg top-langs.svg
          if git diff --cached --quiet; then
            echo "No change — skipping commit"
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore(contributions): refresh counter, activity chart, stats + langs cards"
          git push
