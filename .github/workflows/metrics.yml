# ──────────────────────────────────────────────────────────────────────────
#  EmminiX/EmminiX — auto-updated profile metrics
#  Renders a rich SVG every 6h + on main pushes.
#
#  Fork choice (2026-05-11): we use gh-metrics/metrics, the actively
#  maintained community fork. lowlighter/metrics has been unmaintained for
#  ~2 years and the "Manager" achievement still queries the deprecated
#  Projects (classic) API, which makes the whole achievements panel fail.
#  See lowlighter/metrics#1706.
#
#  Pinned to commit c09a9ea (2026-05-11). Bump intentionally.
#
#  ONE-TIME SETUP (required for first run):
#   1. Create a classic Personal Access Token at:
#      https://github.com/settings/tokens/new
#      Name:  "EmminiX profile metrics"
#      Scopes: repo, read:user, read:org
#        • Use full "repo" (not just public_repo) if you want the lines
#          plugin to count private repo work too. With public_repo only,
#          line totals under-report private commits.
#      Expiration: 1 year (rotate before expiry)
#   2. Add it as a repo secret:
#      Settings → Secrets and variables → Actions → "New repository secret"
#      Name:  METRICS_TOKEN
#      Value: <paste the PAT>
#   3. Re-run this workflow manually via the "Run workflow" button once to
#      produce the first metrics.svg and commit it to main.
#
#  After that, the cron schedule keeps it fresh every 6 hours.
# ──────────────────────────────────────────────────────────────────────────

name: Metrics

on:
  schedule:
    - cron: "0 */6 * * *"        # every 6 hours
  push:
    branches: [main]
  workflow_dispatch:              # manual trigger from the Actions tab

permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Generate metrics.svg
        # Maintained community fork (lowlighter/metrics is unmaintained).
        # Pinned to a SHA for supply-chain hygiene.
        uses: gh-metrics/metrics@c09a9ea3f9a839e7f7e74a01018ae0d3a4267e16
        with:
          # ── Authentication ─────────────────────────────────────────────
          token: ${{ secrets.METRICS_TOKEN }}
          user: EmminiX

          # ── Base layout ────────────────────────────────────────────────
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Europe/Dublin
          config_order: base.header, isocalendar, languages, stars, activity, achievements

          # ── Repository fetch tuning (broader pool → richer stats) ──────
          repositories: 200
          repositories_affiliations: owner, collaborator

          # ── Contribution heatmap (half-year isometric calendar) ────────
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year

          # ── Language breakdown (most-used + recently-used) ─────────────
          plugin_languages: yes
          plugin_languages_sections: most-used, recently-used
          plugin_languages_details: percentage, lines, bytes-size
          plugin_languages_colors: github
          plugin_languages_limit: 8

          # ── Lines of code stats ────────────────────────────────────────
          plugin_lines: yes
          plugin_lines_sections: base, repositories
          plugin_lines_repositories_limit: 4

          # ── Top starred repos (up to 4) ────────────────────────────────
          plugin_stars: yes
          plugin_stars_limit: 4

          # ── Follower / following ratio ─────────────────────────────────
          plugin_followup: yes

          # ── Achievements (B-tier and above) ────────────────────────────
          # The fork already patches the Projects-classic bug, but we
          # belt-and-braces ignore the "manager" badge so a future
          # regression cannot blank the whole panel.
          plugin_achievements: yes
          plugin_achievements_threshold: B
          plugin_achievements_secrets: yes
          plugin_achievements_ignored: manager

          # ── Output: commit metrics.svg to main ─────────────────────────
          output_action: commit
          committer_branch: main
          committer_message: "chore(metrics): auto-update profile metrics"
          filename: metrics.svg
